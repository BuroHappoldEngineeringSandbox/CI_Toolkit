# Sandbox proxy — calls CI_Toolkit on the feat/ci-versioning-extensibility branch
# so the test_toolkit_repo and versioning_toolkit_repo inputs can be exercised
# before the feature branch merges to develop.
#
# Once feat/ci-versioning-extensibility merges to develop, change @feat/... to @develop.

name: Versioning

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  versioning:
    uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/workflows/ci-versioning.yml@feat/ci-versioning-extensibility
    secrets: inherit
    with:
      versioning_toolkit_repo: 'BuroHappoldEngineeringSandbox/Versioning_Toolkit'
      test_toolkit_repo: 'BuroHappoldEngineeringSandbox/Test_Toolkit'
