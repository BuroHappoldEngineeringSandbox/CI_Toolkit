# Prototype-tier proxy, BHE variant. Bundles the tier's checks. Copyright is
# omitted (private repos do not enforce OSS copyright); all other jobs mirror
# the BHoM variant. Copy to .github/workflows/ci-prototype.yml in each BHE
# prototype repo. Runs on pull_request, non-blocking until a ruleset requires
# its checks.
# Workflow name CI keeps check contexts bare: required contexts are the job names.

name: CI

on:
  pull_request:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  project-compliance:
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
      actions: write
    steps:
      - name: Run project compliance
        uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/actions/ci-compliance@develop
        with:
          check_type: project
          patterns: 'AssemblyInfo.cs *.csproj'
          app_id: ${{ secrets.BHOM_APP_ID }}
          private_key: ${{ secrets.BHOM_APP_PRIVATE_KEY }}
