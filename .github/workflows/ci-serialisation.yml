# Staging proxy workflow for CI_Toolkit â€” copy to .github/workflows/ci-serialisation.yml in your
# staging org's proxy repo (e.g. BuroHappoldEngineeringSandbox/CI_Toolkit_Proxy).
#
# Points to @fix/serialisation-no-verify-guard â€” use only in staging orgs. Production proxies use templates/ci-serialisation.yml (@main).
#
# Required by rulesets: beta

name: Serialisation

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  serialisation:
    uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/workflows/ci-serialisation.yml@fix/serialisation-no-verify-guard
    secrets:
      BHOM_APP_ID: ${{ secrets.BHOM_APP_ID }}
      BHOM_APP_PRIVATE_KEY: ${{ secrets.BHOM_APP_PRIVATE_KEY }}
    with:
      base_ref: ${{ github.base_ref }}
