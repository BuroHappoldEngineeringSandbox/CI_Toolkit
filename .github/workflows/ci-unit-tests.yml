# Proxy workflow for CI_Toolkit — copy to .github/workflows/ci-unit-tests.yml in your
# org's proxy repo (e.g. BHoM/CI_Proxy).
#
# Required by rulesets: alpha, beta
#
# The org ruleset for each applicable maturity tier should require:
#   <proxy-repo>/.github/workflows/ci-unit-tests.yml@develop
#
# The paths: filter mirrors CI_Toolkit's own ci-unit-tests.yml. It must be duplicated here
# because GitHub does not propagate paths filters from a called reusable workflow when
# evaluating ruleset required-workflow checks.

name: Unit Tests

on:
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.props'
      - '**/*.targets'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  unit-tests:
    uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/workflows/ci-unit-tests.yml@develop
    secrets:
      BHOM_APP_ID: ${{ secrets.BHOM_APP_ID }}
      BHOM_APP_PRIVATE_KEY: ${{ secrets.BHOM_APP_PRIVATE_KEY }}
    with:
      pr_number: ${{ github.event.pull_request.number }}
