# Proxy workflow for CI_Toolkit — copy to .github/workflows/ci-documentation-compliance.yml
# in your org's proxy repo (e.g. BHoM/CI_Proxy).
#
# Required by rulesets: beta
#
# The org ruleset for the beta maturity tier should require:
#   <proxy-repo>/.github/workflows/ci-documentation-compliance.yml@develop
#
# The paths: filter mirrors CI_Toolkit's own ci-documentation-compliance.yml. It must be
# duplicated here because GitHub does not propagate paths filters from a called reusable
# workflow when evaluating ruleset required-workflow checks.

name: Documentation Compliance

on:
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  documentation-compliance:
    uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/workflows/ci-documentation-compliance.yml@develop
    secrets: inherit
