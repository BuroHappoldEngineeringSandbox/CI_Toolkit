# Proxy workflow for CI_Toolkit — copy to .github/workflows/ci-dataset-compliance.yml
# in your org's proxy repo (e.g. BHoM/CI_Proxy).
#
# Required by rulesets: beta
#
# The org ruleset for the beta maturity tier should require:
#   <proxy-repo>/.github/workflows/ci-dataset-compliance.yml@main
#
# The paths: filter mirrors CI_Toolkit's own ci-dataset-compliance.yml. It must be
# duplicated here because GitHub does not propagate paths filters from a called reusable
# workflow when evaluating ruleset required-workflow checks.

name: Dataset Compliance

on:
  pull_request:
    paths:
      - '**/datasets/**/*.json'
      - '**/datasets*.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  dataset-compliance:
    uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/workflows/ci-dataset-compliance.yml@main
    secrets: inherit
