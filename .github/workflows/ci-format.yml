# Proxy workflow for CI_Toolkit — copy to .github/workflows/ci-format.yml in your
# org's proxy repo (e.g. BHoM/CI_Proxy).
#
# Required by rulesets: prototype, alpha, beta
#
# The org ruleset for each applicable maturity tier should require:
#   <proxy-repo>/.github/workflows/ci-format.yml@main
#
# The paths: filter mirrors CI_Toolkit's own ci-format.yml. It must be duplicated here
# because GitHub does not propagate paths filters from a called reusable workflow when
# evaluating ruleset required-workflow checks.

name: Format

on:
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.targets'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  format:
    uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/workflows/ci-format.yml@main
    secrets: inherit
