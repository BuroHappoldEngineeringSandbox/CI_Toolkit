# Proxy workflow for CI_Toolkit — copy to .github/workflows/ci-dataset-tests.yml in your
# org's proxy repo (e.g. BHoM/CI_Toolkit_Proxy).
#
# The org ruleset for the beta maturity tier should require:
#   <proxy-repo>/.github/workflows/ci-dataset-tests.yml@main
#
# Note: paths filters are ignored by GitHub org rulesets — the workflow always runs on
# every pull_request. Early exits within the reusable workflow handle no-op cases.
#
# Required by rulesets: beta

name: Dataset Unit Tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  dataset-tests:
    uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/workflows/ci-dataset-tests.yml@develop
    secrets: inherit
