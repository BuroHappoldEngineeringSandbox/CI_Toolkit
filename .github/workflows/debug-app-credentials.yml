name: Debug App Credentials (Sandbox)

# Tests whether BHOM_APP_ID and BHOM_APP_PRIVATE_KEY are accessible
# directly from this proxy repo's context (no cross-org call involved).
#
# If APP_ID shows as empty here, the secret is not accessible to this repo
# in the sandbox org — check the org secret repository access settings.
# If APP_ID is non-empty and token mints successfully, the issue is with
# secrets:inherit across org boundaries in the reusable workflow call.

on:
  workflow_dispatch:

jobs:
  debug-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret availability (sandbox context)
        id: secret-check
        env:
          APP_ID: ${{ secrets.BHOM_APP_ID }}
          APP_KEY: ${{ secrets.BHOM_APP_PRIVATE_KEY }}
        run: |
          echo "=== Sandbox proxy secret availability ==="
          echo "BHOM_APP_ID length:          ${#APP_ID}"
          echo "BHOM_APP_PRIVATE_KEY length:  ${#APP_KEY}"

          if [ -z "$APP_ID" ]; then
            echo "::error::BHOM_APP_ID is empty in sandbox proxy context."
            echo "  The secret exists in the org but is NOT accessible to this repo."
            echo "  Fix: org Settings -> Secrets -> BHOM_APP_ID -> Repository access -> add CI_Toolkit."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::BHOM_APP_ID is present (length ${#APP_ID}). Secret IS accessible here."
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$APP_KEY" ]; then
            echo "::error::BHOM_APP_PRIVATE_KEY is empty in sandbox proxy context."
          else
            echo "::notice::BHOM_APP_PRIVATE_KEY is present (length ${#APP_KEY})."
          fi

      - name: Mint token (sandbox context)
        id: app-token
        if: steps.secret-check.outputs.available == 'true'
        uses: actions/create-github-app-token@07e2b760664f080c40eec4eacf7477256582db36
        with:
          client-id: ${{ secrets.BHOM_APP_ID }}
          private-key: ${{ secrets.BHOM_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Verify token
        if: steps.secret-check.outputs.available == 'true'
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Token mint failed despite secrets being present."
            exit 1
          fi
          echo "::notice::Token minted successfully (length ${#TOKEN})."
          RESPONSE=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/installation/repositories?per_page=1" 2>&1) || true
          if echo "$RESPONSE" | grep -q '"total_count"'; then
            COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_count','?'))" 2>/dev/null || echo "?")
            echo "::notice::Token scope OK — installation repo count: $COUNT"
          else
            echo "::warning::Could not verify token scope. Response: $RESPONSE"
          fi
