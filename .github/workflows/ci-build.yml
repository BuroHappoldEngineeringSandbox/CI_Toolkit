# Proxy workflow for CI_Toolkit — copy to .github/workflows/ci-build.yml in your
# org's proxy repo (e.g. BHoM/CI_Proxy).
#
# Required by rulesets: alpha, beta
#
# The org ruleset for each applicable maturity tier should require:
#   <proxy-repo>/.github/workflows/ci-build.yml@main
#
# The paths: filter mirrors CI_Toolkit's own ci-build.yml. It must be duplicated here
# because GitHub does not propagate paths filters from a called reusable workflow when
# evaluating ruleset required-workflow checks.

name: Build

on:
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.props'
      - '**/*.targets'
      - 'altConfigs.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/workflows/ci-build.yml@main
    secrets: inherit
